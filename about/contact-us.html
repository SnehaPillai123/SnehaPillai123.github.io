<!DOCTYPE html>
<html>
<head>
    <title>Contact Me</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
        }
        form {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 300px;
            border-radius: 10px;
        }
        input, textarea {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            background: #333;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>Contact Me</h1>
</header>

<form>
    <input type="text" placeholder="Your Name" required><br>
    <input type="email" placeholder="Your Email" required><br>
    <textarea rows="5" placeholder="Your Message"></textarea><br>
    <button type="submit">Send</button>
</form>

<p>Email: example@gmail.com</p>

</body>
</html>
